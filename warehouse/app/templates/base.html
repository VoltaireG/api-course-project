<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title if title else "warehouse" }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; vertical-align: top; }
    th { background: #f5f5f5; text-align: left; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btn { display: inline-block; padding: 6px 10px; border: 1px solid #333; background: #fff; cursor: pointer; text-decoration: none; }
    .btn-danger { border-color: #a00; }
    .muted { color: #666; }
    input, textarea { width: 100%; padding: 8px; }
    textarea { min-height: 80px; }
    .card { border: 1px solid #ddd; padding: 12px; margin-bottom: 12px; }
    form { margin: 0; }
  </style>
</head>
<body>
  <div class="row" style="justify-content: space-between;">
    <div>
      <strong>warehouse system</strong>
      <span class="muted">| noliktavas pārvaldība + API</span>
    </div>
    <div class="row">
      <a class="btn" href="/products">products</a>
      <a class="btn" href="/products/create">add product</a>
      <a class="btn" href="/api/products" target="_blank">api: all products</a>
    </div>
  </div>
  <hr />
  {% block content %}{% endblock %}
</body>
</html>
