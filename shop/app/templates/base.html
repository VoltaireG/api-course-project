<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title if title else "shop" }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; vertical-align: top; }
    th { background: #f5f5f5; text-align: left; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btn { display: inline-block; padding: 6px 10px; border: 1px solid #333; background: #fff; cursor: pointer; text-decoration: none; }
    .btn-danger { border-color: #a00; }
    .card { border: 1px solid #ddd; padding: 12px; margin-bottom: 12px; }
    .muted { color: #666; }
    form { margin: 0; }
    code { background: #f7f7f7; padding: 2px 4px; }
  </style>
</head>
<body>
  <div class="row" style="justify-content: space-between;">
    <div>
      <strong>shop system</strong>
      <span class="muted">| internetveikals (imports + stock refresh via warehouse api)</span>
    </div>
    <div class="row">
      <a class="btn" href="/products">products</a>
      <a class="btn" href="/admin">admin</a>
    </div>
  </div>
  <div class="muted" style="margin-top: 8px;">
    warehouse base url: <code>{{ warehouse_base_url }}</code>
  </div>
  <hr />
  {% block content %}{% endblock %}
</body>
</html>
